<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD */
.card {
  width: 90%;
  max-width: 350px;
  padding: 25px;
  border-radius: 20px;
  background: linear-gradient(145deg, #0d0d0d, #1a1a1a);
  box-shadow: 
    0 10px 30px rgba(255, 200, 0, 0.2),
    inset 0 0 10px rgba(255,255,255,0.05);
  text-align: center;
  transform: perspective(1000px) rotateX(5deg);
}

/* PROFILE */
.profile {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  padding: 5px;
  margin: auto;
  background: linear-gradient(135deg, gold, orange);
  box-shadow: 0 0 25px rgba(255, 200, 0, 0.6);
  overflow: hidden;
}

.profile img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  object-position: center;
}

/* TEXT */
h1 {
  color: #fff;
  margin: 15px 0 5px;
  letter-spacing: 2px;
}

.sub {
  color: #ffcc00;
  font-size: 14px;
  margin-bottom: 20px;
}

/* GOLD BUTTON */
.btn {
  display: block;
  padding: 16px;
  border-radius: 40px;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  color: #000;
  background: linear-gradient(
    135deg,
    #fff6b7 0%,
    #fdd835 25%,
    #f9a825 50%,
    #fdd835 75%,
    #fff6b7 100%
  );
  box-shadow: 
    0 6px 15px rgba(255, 215, 0, 0.5),
    inset 0 2px 5px rgba(255,255,255,0.6),
    inset 0 -3px 5px rgba(0,0,0,0.3);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

/* SHINE */
.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.7),
    transparent
  );
  transition: 0.6s;
}

.btn:hover::before {
  left: 100%;
}

.btn:hover {
  transform: scale(1.05);
}

.btn:active {
  transform: scale(0.97);
}

/* FOOTER */
.footer {
  margin-top: 15px;
  color: #ccc;
  font-size: 12px;
}
